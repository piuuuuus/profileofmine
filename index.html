<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人求职风采展示</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #0a2463;
            --secondary-color: #3e92cc;
            --accent-color: #d8315b;
            --background-color: #f8f9fa;
            --card-background: rgba(255, 255, 255, 0.85);
            --text-color: #333;
            --text-light: #666;
            --border-radius: 12px;
            --box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s ease;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 60px 20px;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            color: white;
            border-radius: var(--border-radius);
            margin-bottom: 40px;
            box-shadow: var(--box-shadow);
            position: relative;
            overflow: hidden;
        }

        header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0) 70%);
            animation: pulse 6s ease-in-out infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 0.5;
            }
            50% {
                transform: scale(1.1);
                opacity: 0.8;
            }
            100% {
                transform: scale(1);
                opacity: 0.5;
            }
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            position: relative;
            z-index: 1;
        }

        .subtitle {
            font-size: 1.2rem;
            opacity: 0.9;
            position: relative;
            z-index: 1;
        }

        .card {
            background: var(--card-background);
            backdrop-filter: blur(10px);
            border-radius: var(--border-radius);
            box-shadow: var(--box-shadow);
            padding: 30px;
            margin-bottom: 30px;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
        }

        h2 {
            color: var(--primary-color);
            margin-bottom: 20px;
            font-size: 1.8rem;
            display: flex;
            align-items: center;
        }

        h2 i {
            margin-right: 10px;
            color: var(--secondary-color);
        }

        .edit-mode .card {
            border: 2px dashed #ccc;
        }

        .edit-controls {
            position: absolute;
            top: 10px;
            right: 10px;
            display: flex;
            gap: 5px;
            opacity: 0;
            transition: var(--transition);
        }

        .card:hover .edit-controls {
            opacity: 1;
        }

        .edit-btn {
            background: var(--secondary-color);
            color: white;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
        }

        .edit-btn:hover {
            background: var(--primary-color);
            transform: scale(1.1);
        }

        .content-editable {
            min-height: 100px;
            padding: 10px;
            border-radius: 8px;
            transition: var(--transition);
        }

        .content-editable:focus {
            outline: 2px solid var(--secondary-color);
            background: rgba(62, 146, 204, 0.05);
        }

        .upload-area {
            border: 2px dashed var(--secondary-color);
            border-radius: var(--border-radius);
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            margin: 20px 0;
        }

        .upload-area:hover {
            border-color: var(--primary-color);
            background-color: rgba(62, 146, 204, 0.05);
        }

        .upload-area.dragover {
            border-color: var(--accent-color);
            background-color: rgba(216, 49, 91, 0.1);
        }

        .upload-icon {
            font-size: 4rem;
            color: var(--secondary-color);
            margin-bottom: 20px;
        }

        .upload-text {
            font-size: 1.2rem;
            color: var(--text-light);
        }

        input[type="file"] {
            display: none;
        }

        .btn {
            display: inline-block;
            padding: 12px 24px;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
            text-align: center;
            margin: 10px 5px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(10, 36, 99, 0.4);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #6c757d 0%, #495057 100%);
        }

        .btn-danger {
            background: linear-gradient(135deg, var(--accent-color) 0%, #b3264c 100%);
        }

        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .portfolio-item {
            background: white;
            border-radius: var(--border-radius);
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transition: var(--transition);
            cursor: pointer;
        }

        .portfolio-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
        }

        .portfolio-item img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            transition: var(--transition);
        }

        .portfolio-item:hover img {
            transform: scale(1.05);
        }

        .portfolio-content {
            padding: 20px;
        }

        .portfolio-content h3 {
            margin-bottom: 10px;
            color: var(--primary-color);
        }

        .portfolio-content p {
            color: var(--text-light);
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition);
        }

        .modal.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: white;
            border-radius: var(--border-radius);
            padding: 20px;
            max-width: 90%;
            max-height: 90%;
            overflow: auto;
            position: relative;
            transform: scale(0.8);
            transition: var(--transition);
        }

        .modal.active .modal-content {
            transform: scale(1);
        }

        .modal-close {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
        }

        .modal-close:hover {
            background: #b3264c;
            transform: scale(1.1);
        }

        .login-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .login-form {
            background: white;
            border-radius: var(--border-radius);
            padding: 40px;
            max-width: 400px;
            width: 90%;
            box-shadow: var(--box-shadow);
        }

        .login-form h2 {
            text-align: center;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: var(--text-color);
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 1rem;
            transition: var(--transition);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--secondary-color);
            box-shadow: 0 0 0 3px rgba(62, 146, 204, 0.1);
        }

        .admin-controls {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
        }

        .toggle-edit-btn {
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: var(--box-shadow);
            transition: var(--transition);
        }

        .toggle-edit-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 15px rgba(216, 49, 91, 0.4);
        }

        .add-module-btn {
            background: var(--secondary-color);
            color: white;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: var(--box-shadow);
            transition: var(--transition);
            margin-top: 10px;
        }

        .add-module-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 15px rgba(62, 146, 204, 0.4);
        }

        .sortable-ghost {
            opacity: 0.5;
            background: #f0f0f0;
        }

        .sortable-drag {
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }

            header {
                padding: 40px 20px;
            }

            h1 {
                font-size: 2rem;
            }

            .card {
                padding: 20px;
            }

            .portfolio-grid {
                grid-template-columns: 1fr;
            }

            .upload-area {
                padding: 30px;
            }
        }

        .fade-in {
            animation: fadeIn 0.6s ease forwards;
            opacity: 0;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .section-enter-active,
        .section-leave-active {
            transition: all 0.5s ease;
        }

        .section-enter-from,
        .section-leave-to {
            opacity: 0;
            transform: translateY(30px);
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- 登录模态框 -->
        <div v-if="showLogin" class="login-modal">
            <div class="login-form">
                <h2><i class="fas fa-lock"></i> 编辑模式登录</h2>
                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" v-model="loginPassword" placeholder="请输入密码">
                </div>
                <div style="text-align: center;">
                    <button class="btn" @click="login">登录</button>
                    <button class="btn btn-secondary" @click="showLogin = false">取消</button>
                </div>
            </div>
        </div>

        <!-- 管理员控制按钮 -->
        <div class="admin-controls">
            <button class="toggle-edit-btn" @click="toggleEditMode" title="编辑模式">
                <i class="fas" :class="isEditMode ? 'fa-eye' : 'fa-edit'"></i>
            </button>
            <button v-if="isEditMode" class="add-module-btn" @click="showAddModule = true" title="添加模块">
                <i class="fas fa-plus"></i>
            </button>
        </div>

        <!-- 添加模块模态框 -->
        <div v-if="showAddModule" class="modal active">
            <div class="modal-content">
                <button class="modal-close" @click="showAddModule = false">&times;</button>
                <h2><i class="fas fa-plus-circle"></i> 添加新模块</h2>
                <div class="form-group">
                    <label for="moduleTitle">模块标题</label>
                    <input type="text" id="moduleTitle" v-model="newModule.title" placeholder="请输入模块标题">
                </div>
                <div class="form-group">
                    <label for="moduleIcon">图标类名 (例如: fa-briefcase)</label>
                    <input type="text" id="moduleIcon" v-model="newModule.icon" placeholder="请输入图标类名">
                </div>
                <div style="text-align: center;">
                    <button class="btn" @click="addModule">添加</button>
                    <button class="btn btn-secondary" @click="showAddModule = false">取消</button>
                </div>
            </div>
        </div>

        <!-- 预览模态框 -->
        <div v-if="showPreview" class="modal active">
            <div class="modal-content">
                <button class="modal-close" @click="showPreview = false">&times;</button>
                <div v-if="previewType === 'image'">
                    <img :src="previewData" alt="预览" style="max-width: 100%; max-height: 80vh;">
                </div>
                <div v-else-if="previewType === 'pdf'">
                    <iframe :src="previewData" style="width: 100%; height: 80vh; border: none;"></iframe>
                </div>
            </div>
        </div>

        <div class="container" :class="{ 'edit-mode': isEditMode }">
            <header>
                <h1>{{ profile.name }}</h1>
                <p class="subtitle">{{ profile.title }}</p>
            </header>

            <!-- 个人介绍 -->
            <div class="card fade-in" data-section="introduction">
                <div class="edit-controls" v-if="isEditMode">
                    <button class="edit-btn" @click="toggleEdit('introduction')" title="编辑">
                        <i class="fas fa-pen"></i>
                    </button>
                    <button class="edit-btn btn-danger" @click="toggleVisibility('introduction')" title="显示/隐藏">
                        <i class="fas" :class="sections.introduction.visible ? 'fa-eye' : 'fa-eye-slash'"></i>
                    </button>
                </div>
                <h2><i class="fas fa-user"></i> 个人介绍</h2>
                <div v-if="!isEditMode || !editingSection.includes('introduction')" class="content">
                    {{ sections.introduction.content }}
                </div>
                <textarea v-else v-model="sections.introduction.content" class="content-editable" style="width: 100%; height: 200px; resize: vertical;"></textarea>
            </div>

            <!-- 简历 -->
            <div class="card fade-in" data-section="resume" v-if="sections.resume.visible">
                <div class="edit-controls" v-if="isEditMode">
                    <button class="edit-btn" @click="toggleEdit('resume')" title="编辑">
                        <i class="fas fa-pen"></i>
                    </button>
                    <button class="edit-btn btn-danger" @click="toggleVisibility('resume')" title="显示/隐藏">
                        <i class="fas" :class="sections.resume.visible ? 'fa-eye' : 'fa-eye-slash'"></i>
                    </button>
                </div>
                <h2><i class="fas fa-file-alt"></i> 简历</h2>
                <div v-if="!isEditMode || !editingSection.includes('resume')" class="content">
                    <div v-if="sections.resume.fileUrl">
                        <button class="btn" @click="previewFile(sections.resume.fileUrl, sections.resume.fileType)">预览简历</button>
                        <a :href="sections.resume.fileUrl" class="btn btn-secondary" download>下载简历</a>
                    </div>
                    <div v-else>
                        <p>暂无简历上传</p>
                    </div>
                </div>
                <div v-else class="content">
                    <div class="upload-area" @click="triggerFileInput('resume')" @dragover.prevent @dragenter.prevent @drop="handleFileDrop($event, 'resume')">
                        <div class="upload-icon">📄</div>
                        <p class="upload-text">点击或拖拽文件到此处上传简历</p>
                        <input type="file" id="resumeFile" accept=".pdf,.doc,.docx" @change="handleFileUpload($event, 'resume')">
                    </div>
                    <div v-if="sections.resume.fileUrl" class="file-info">
                        <p>已上传: {{ sections.resume.fileName }}</p>
                        <button class="btn btn-danger" @click="removeFile('resume')">移除文件</button>
                    </div>
                </div>
            </div>

            <!-- 作品集 -->
            <div class="card fade-in" data-section="portfolio" v-if="sections.portfolio.visible">
                <div class="edit-controls" v-if="isEditMode">
                    <button class="edit-btn" @click="toggleEdit('portfolio')" title="编辑">
                        <i class="fas fa-pen"></i>
                    </button>
                    <button class="edit-btn btn-danger" @click="toggleVisibility('portfolio')" title="显示/隐藏">
                        <i class="fas" :class="sections.portfolio.visible ? 'fa-eye' : 'fa-eye-slash'"></i>
                    </button>
                </div>
                <h2><i class="fas fa-briefcase"></i> 作品集</h2>
                <div v-if="!isEditMode || !editingSection.includes('portfolio')" class="content">
                    <div class="portfolio-grid">
                        <div v-for="(item, index) in sections.portfolio.items" :key="index" class="portfolio-item" @click="previewFile(item.url, 'image')">
                            <img :src="item.url" :alt="item.title">
                            <div class="portfolio-content">
                                <h3>{{ item.title }}</h3>
                                <p>{{ item.description }}</p>
                            </div>
                        </div>
                        <div v-if="sections.portfolio.items.length === 0">
                            <p>暂无作品</p>
                        </div>
                    </div>
                </div>
                <div v-else class="content">
                    <div class="upload-area" @click="triggerFileInput('portfolio')" @dragover.prevent @dragenter.prevent @drop="handleFileDrop($event, 'portfolio')">
                        <div class="upload-icon">🖼️</div>
                        <p class="upload-text">点击或拖拽图片到此处上传作品</p>
                        <input type="file" id="portfolioFile" accept="image/*" multiple @change="handleFileUpload($event, 'portfolio')">
                    </div>
                    <div v-if="sections.portfolio.items.length > 0" class="portfolio-grid">
                        <div v-for="(item, index) in sections.portfolio.items" :key="index" class="portfolio-item">
                            <img :src="item.url" :alt="item.title">
                            <div class="portfolio-content">
                                <input v-model="item.title" class="content-editable" style="width: 100%; margin-bottom: 10px;">
                                <textarea v-model="item.description" class="content-editable" style="width: 100%; height: 100px; resize: vertical;"></textarea>
                                <button class="btn btn-danger" @click="removePortfolioItem(index)">删除</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 动态模块 -->
            <div v-for="(module, index) in customModules" :key="module.id" class="card fade-in" :data-section="module.id"
                 draggable="true"
                 @dragstart="dragStart($event, index)"
                 @dragover.prevent
                 @drop="drop($event, index)">
                <div class="edit-controls" v-if="isEditMode">
                    <button class="edit-btn" @click="toggleEdit(module.id)" title="编辑">
                        <i class="fas fa-pen"></i>
                    </button>
                    <button class="edit-btn btn-danger" @click="toggleVisibility(module.id)" title="显示/隐藏">
                        <i class="fas" :class="module.visible ? 'fa-eye' : 'fa-eye-slash'"></i>
                    </button>
                    <button class="edit-btn btn-danger" @click="removeModule(index)" title="删除">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
                <h2><i :class="'fas ' + module.icon"></i> {{ module.title }}</h2>
                <div v-if="!isEditMode || !editingSection.includes(module.id)" class="content">
                    {{ module.content }}
                </div>
                <textarea v-else v-model="module.content" class="content-editable" style="width: 100%; height: 200px; resize: vertical;"></textarea>
            </div>
        </div>
    </div>

    <script>
        const { createApp } = Vue

        createApp({
            data() {
                return {
                    isEditMode: false,
                    showLogin: false,
                    loginPassword: '',
                    showAddModule: false,
                    showPreview: false,
                    previewType: '',
                    previewData: '',
                    editingSection: [],
                    loginAttempts: 0,
                    dragIndex: -1,
                    profile: {
                        name: '张三',
                        title: '前端开发工程师'
                    },
                    sections: {
                        introduction: {
                            content: '我是一名具有5年前端开发经验的工程师，熟练掌握Vue、React等前端框架，擅长构建响应式、高性能的Web应用。我热爱技术，不断学习新技术，致力于为用户创造优质的产品体验。',
                            visible: true
                        },
                        resume: {
                            fileUrl: '',
                            fileName: '',
                            fileType: '',
                            visible: true
                        },
                        portfolio: {
                            items: [],
                            visible: true
                        }
                    },
                    customModules: [],
                    newModule: {
                        title: '',
                        icon: 'fa-star',
                        content: '',
                        visible: true
                    }
                }
            },
            mounted() {
                this.loadData();
                this.setupScrollAnimation();
            },
            methods: {
                loadData() {
                    // 从本地存储加载数据
                    const savedData = localStorage.getItem('portfolioData');
                    if (savedData) {
                        const data = JSON.parse(savedData);
                        this.profile = data.profile || this.profile;
                        this.sections = data.sections || this.sections;
                        this.customModules = data.customModules || this.customModules;
                    }
                },
                saveData() {
                    // 保存数据到本地存储
                    const data = {
                        profile: this.profile,
                        sections: this.sections,
                        customModules: this.customModules
                    };
                    localStorage.setItem('portfolioData', JSON.stringify(data));
                },
                toggleEditMode() {
                    if (!this.isEditMode) {
                        this.showLogin = true;
                    } else {
                        this.isEditMode = false;
                        this.editingSection = [];
                        this.saveData();
                    }
                },
                login() {
                    // 简单的密码验证，实际项目中应该使用更安全的方式
                    const correctPassword = 'admin123'; // 可以修改为你自己的密码
                    if (this.loginPassword === correctPassword) {
                        this.isEditMode = true;
                        this.showLogin = false;
                        this.loginAttempts = 0;
                    } else {
                        this.loginAttempts++;
                        if (this.loginAttempts >= 3) {
                            alert('密码错误次数过多，请稍后再试');
                            this.showLogin = false;
                            this.loginAttempts = 0;
                        } else {
                            alert('密码错误，请重试');
                        }
                    }
                    this.loginPassword = '';
                },
                toggleEdit(section) {
                    const index = this.editingSection.indexOf(section);
                    if (index > -1) {
                        this.editingSection.splice(index, 1);
                        this.saveData();
                    } else {
                        this.editingSection.push(section);
                    }
                },
                toggleVisibility(section) {
                    if (this.sections[section]) {
                        this.sections[section].visible = !this.sections[section].visible;
                    } else {
                        const module = this.customModules.find(m => m.id === section);
                        if (module) {
                            module.visible = !module.visible;
                        }
                    }
                    this.saveData();
                },
                addModule() {
                    if (this.newModule.title) {
                        const newModule = {
                            id: 'module_' + Date.now(),
                            title: this.newModule.title,
                            icon: this.newModule.icon,
                            content: this.newModule.content,
                            visible: this.newModule.visible
                        };
                        this.customModules.push(newModule);
                        this.showAddModule = false;
                        this.newModule = {
                            title: '',
                            icon: 'fa-star',
                            content: '',
                            visible: true
                        };
                        this.saveData();
                    } else {
                        alert('请输入模块标题');
                    }
                },
                removeModule(index) {
                    if (confirm('确定要删除这个模块吗？')) {
                        this.customModules.splice(index, 1);
                        this.saveData();
                    }
                },
                triggerFileInput(type) {
                    document.getElementById(type + 'File').click();
                },
                handleFileUpload(event, type) {
                    const files = event.target.files;
                    if (files.length > 0) {
                        if (type === 'resume') {
                            this.handleResumeUpload(files[0]);
                        } else if (type === 'portfolio') {
                            this.handlePortfolioUpload(files);
                        }
                    }
                },
                handleFileDrop(event, type) {
                    event.preventDefault();
                    const files = event.dataTransfer.files;
                    if (files.length > 0) {
                        if (type === 'resume') {
                            this.handleResumeUpload(files[0]);
                        } else if (type === 'portfolio') {
                            this.handlePortfolioUpload(files);
                        }
                    }
                },
                handleResumeUpload(file) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        this.sections.resume.fileUrl = e.target.result;
                        this.sections.resume.fileName = file.name;
                        this.sections.resume.fileType = file.type;
                        this.saveData();
                    };
                    reader.readAsDataURL(file);
                },
                handlePortfolioUpload(files) {
                    Array.from(files).forEach(file => {
                        const reader = new FileReader();
                        reader.onload = (e) => {
                            const newItem = {
                                url: e.target.result,
                                title: file.name,
                                description: ''
                            };
                            this.sections.portfolio.items.push(newItem);
                            this.saveData();
                        };
                        reader.readAsDataURL(file);
                    });
                },
                removeFile(type) {
                    if (confirm('确定要移除文件吗？')) {
                        this.sections[type].fileUrl = '';
                        this.sections[type].fileName = '';
                        this.sections[type].fileType = '';
                        this.saveData();
                    }
                },
                removePortfolioItem(index) {
                    if (confirm('确定要删除这个作品吗？')) {
                        this.sections.portfolio.items.splice(index, 1);
                        this.saveData();
                    }
                },
                previewFile(url, type) {
                    this.previewType = type;
                    this.previewData = url;
                    this.showPreview = true;
                },
                setupScrollAnimation() {
                    const observerOptions = {
                        threshold: 0.1,
                        rootMargin: '0px 0px -50px 0px'
                    };

                    const observer = new IntersectionObserver((entries) => {
                        entries.forEach(entry => {
                            if (entry.isIntersecting) {
                                entry.target.style.animationDelay = '0.2s';
                                entry.target.classList.add('fade-in');
                            }
                        });
                    }, observerOptions);

                    document.querySelectorAll('.card').forEach(card => {
                        observer.observe(card);
                    });
                },
                dragStart(event, index) {
                    this.dragIndex = index;
                    event.target.classList.add('sortable-drag');
                },
                drop(event, dropIndex) {
                    event.preventDefault();
                    if (this.dragIndex !== -1 && this.dragIndex !== dropIndex) {
                        const draggedModule = this.customModules.splice(this.dragIndex, 1)[0];
                        this.customModules.splice(dropIndex, 0, draggedModule);
                        this.saveData();
                    }
                    this.dragIndex = -1;
                    document.querySelectorAll('.card').forEach(card => {
                        card.classList.remove('sortable-drag');
                    });
                }
            }
        }).mount('#app')
    </script>
</body>
</html>
